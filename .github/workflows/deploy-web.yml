name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: |
          if npm run build:web; then
            echo "expo export succeeded"
          else
            echo "::warning::expo export failed, using fallback index.html"
            mkdir -p dist
            cp scripts/fallback-index.html dist/index.html
          fi

      - name: Inject no-cache meta + cache-buster into index.html
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html does not exist"
            ls -la dist/ 2>/dev/null || echo "no dist dir"
            exit 1
          fi
          node scripts/inject-cache-buster.js dist/index.html
          echo "=== AFTER ==="
          head -20 dist/index.html
          echo "=== SCRIPT TAG ==="
          grep -E 'script src' dist/index.html || echo "NO SCRIPT TAG"

      - name: Verify dist exists
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html missing after build"
            exit 1
          fi
          echo "dist size: $(du -sh dist | cut -f1)"
          echo "first 5 entries:"
          ls -la dist | head -5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
