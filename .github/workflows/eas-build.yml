name: EAS Build APK

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build for'
        required: true
        default: 'android'
        type: choice
        options:
        - android
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
        - preview
        - production

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check EAS credentials
        id: eas
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "has_project_id=false" >> "$GITHUB_OUTPUT"
            echo "::warning::EXPO_TOKEN secret is not set. Skipping EAS cloud build. To enable it, add an Expo access token as the EXPO_TOKEN repository secret."
            exit 0
          fi

          echo "has_token=true" >> "$GITHUB_OUTPUT"
          echo "EAS cloud build will run because EXPO_TOKEN is configured."

          # Validate that app.json contains a real EAS projectId, not the placeholder.
          PROJECT_ID=$(node -e "console.log(require('./app.json').expo?.extra?.eas?.projectId || '')")
          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "00000000-0000-0000-0000-000000000000" ]; then
            echo "has_project_id=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No valid EAS projectId found in app.json. Skipping EAS cloud build. Run 'eas init' to configure a real projectId."
          else
            echo "has_project_id=true" >> "$GITHUB_OUTPUT"
            echo "EAS projectId: $PROJECT_ID"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Setup Expo and EAS
        if: steps.eas.outputs.has_token == 'true' && steps.eas.outputs.has_project_id == 'true'
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        if: steps.eas.outputs.has_token == 'true' && steps.eas.outputs.has_project_id == 'true'
        run: |
          echo "Starting EAS Build..."
          eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait

      - name: Build Report
        if: always()
        run: |
          if [ "${{ steps.eas.outputs.has_token }}" == "true" ] && [ "${{ steps.eas.outputs.has_project_id }}" == "true" ]; then
            echo "## 📱 EAS Build Started!" > build-status.txt
            echo "" >> build-status.txt
            echo "- **Platform:** ${{ inputs.platform }}" >> build-status.txt
            echo "- **Profile:** ${{ inputs.profile }}" >> build-status.txt
            echo "" >> build-status.txt
            echo "Check your Expo dashboard for progress and download:" >> build-status.txt
            echo "https://expo.dev/" >> build-status.txt
          elif [ "${{ steps.eas.outputs.has_token }}" == "true" ]; then
            echo "## ⚠️ EAS Build Skipped" > build-status.txt
            echo "" >> build-status.txt
            echo "EXPO_TOKEN is configured, but app.json does not contain a valid EAS projectId." >> build-status.txt
            echo "" >> build-status.txt
            echo "To enable EAS cloud builds:" >> build-status.txt
            echo "1. Run 'eas init' or update app.json with your real EAS projectId" >> build-status.txt
            echo "2. Ensure the projectId is not the placeholder 00000000-0000-0000-0000-000000000000" >> build-status.txt
            echo "" >> build-status.txt
            echo "See BUILD_APK.md and GITHUB_BUILD.md for more details."
          else
            echo "## ⚠️ EAS Build Skipped" > build-status.txt
            echo "" >> build-status.txt
            echo "EXPO_TOKEN secret is not configured in this repository, so the cloud build was skipped." >> build-status.txt
            echo "" >> build-status.txt
            echo "To enable EAS cloud builds:" >> build-status.txt
            echo "1. Create an Expo access token at https://expo.dev/settings/access-tokens" >> build-status.txt
            echo "2. Add it as the EXPO_TOKEN repository secret at Settings > Secrets and variables > Actions" >> build-status.txt
            echo "" >> build-status.txt
            echo "See BUILD_APK.md and GITHUB_BUILD.md for more details."
          fi
          echo "" >> build-status.txt
          echo "### Build Locally" >> build-status.txt
          echo "See BUILD_APK.md for instructions on how to build locally!" >> build-status.txt

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-info
          path: build-status.txt
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.eas.outputs.has_token }}" == "true" ] && [ "${{ steps.eas.outputs.has_project_id }}" == "true" ]; then
            echo "## 📱 EAS Build Started" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Platform:** ${{ inputs.platform }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Profile:** ${{ inputs.profile }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Monitor progress at https://expo.dev/" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.eas.outputs.has_token }}" == "true" ]; then
            echo "## ⚠️ EAS Build Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "EXPO_TOKEN is configured, but app.json does not contain a valid EAS projectId." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run 'eas init' or update app.json with a real projectId to enable cloud builds." >> "$GITHUB_STEP_SUMMARY"
            echo "See BUILD_APK.md and GITHUB_BUILD.md for details." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ EAS Build Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "EXPO_TOKEN secret is not configured." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "To enable cloud builds, add an Expo access token as the EXPO_TOKEN repository secret." >> "$GITHUB_STEP_SUMMARY"
            echo "See BUILD_APK.md and GITHUB_BUILD.md for details." >> "$GITHUB_STEP_SUMMARY"
          fi
