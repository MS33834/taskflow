name: EAS Build APK

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build for'
        required: true
        default: 'android'
        type: choice
        options:
        - android
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
        - preview
        - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'

      - name: Setup Expo and EAS
        if: env.EXPO_TOKEN != ''
        uses: expo/expo-github-action@eab7a230208c952974db8c3245cfd78402c7b385 # v9
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build APK
        if: env.EXPO_TOKEN != ''
        run: |
          echo "Starting EAS Build..."
          eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait
          
      - name: Build Report
        run: |
          echo "## 📱 EAS Build Started!" > build-status.txt
          echo "" >> build-status.txt
          echo "Check your Expo dashboard for progress and download:" >> build-status.txt
          echo "https://expo.dev/" >> build-status.txt
          echo "" >> build-status.txt
          echo "### OR Build Locally!" >> build-status.txt
          echo "See BUILD_APK.md for instructions on how to build locally!" >> build-status.txt
          
      - name: Upload Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-info
          path: build-status.txt
          retention-days: 30
