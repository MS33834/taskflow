name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop
        working-directory: desktop
        run: npm run build

      - name: Package desktop
        working-directory: desktop
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-${{ matrix.os }}
          path: desktop/release/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish signed release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      # 统一产物文件名：electron-builder 在 Windows 上可能生成带空格的文件名，
      # 而 artifact 上传/下载过程中空格可能被替换为点号，导致 SHA256SUMS 与实际 asset 不一致。
      - name: Normalize artifact filenames
        working-directory: release-assets
        run: |
          for f in *; do
            [ -f "$f" ] || continue
            normalized="$(echo "$f" | tr ' ' '.')"
            if [ "$f" != "$normalized" ]; then
              mv -i "$f" "$normalized"
            fi
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts
        working-directory: release-assets
        run: |
          for f in *; do
            [ -f "$f" ] || continue
            cosign sign-blob \
              --yes \
              --output-signature="${f}.sig" \
              --output-certificate="${f}.crt" \
              "$f"
          done

      - name: Generate checksums
        working-directory: release-assets
        run: find . -maxdepth 1 -type f -exec sha256sum {} + > SHA256SUMS.txt

      - name: Sign checksums
        working-directory: release-assets
        run: |
          cosign sign-blob \
            --yes \
            --output-signature="SHA256SUMS.txt.sig" \
            --output-certificate="SHA256SUMS.txt.crt" \
            SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f | sort)
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "TaskFlow ${{ github.ref_name }}" \
            --generate-notes \
            "${assets[@]}"
