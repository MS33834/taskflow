name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop
        working-directory: desktop
        run: npm run build

      - name: Package desktop
        working-directory: desktop
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-${{ matrix.os }}
          path: desktop/release/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish signed release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          path: release-assets
          merge-multiple: true

      - name: Install cosign
        uses: sigstore/cosign-installer@053f9b74638557590800a301da1ba82351507e2c # v3.8.1

      - name: Sign release artifacts
        working-directory: release-assets
        run: |
          for f in *; do
            [ -f "$f" ] || continue
            cosign sign-blob \
              --yes \
              --output-signature="${f}.sig" \
              --output-certificate="${f}.crt" \
              "$f"
          done

      - name: Generate checksums
        working-directory: release-assets
        run: find . -maxdepth 1 -type f -exec sha256sum {} + > SHA256SUMS.txt

      - name: Sign checksums
        working-directory: release-assets
        run: |
          cosign sign-blob \
            --yes \
            --output-signature="SHA256SUMS.txt.sig" \
            --output-certificate="SHA256SUMS.txt.crt" \
            SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f | sort)
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "TaskFlow ${{ github.ref_name }}" \
            --generate-notes \
            "${assets[@]}"
