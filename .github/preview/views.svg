        <text x="104" y="24" font-family="-apple-system, sans-serif" font-size="9" fill="#0F172A" text-anchor="middle">18</text>
        <text x="134" y="24" font-family="-apple-system, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">19</text>
        <text x="164" y="24" font-family="-apple-system, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">20</text>
        <text x="194" y="24" font-family="-apple-system, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">21</text>

