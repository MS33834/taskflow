        <text x="14" y="24" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" text-anchor="middle">15</text>
        <text x="44" y="24" font-family="-apple-system, sans-serif" font-size="9" fill="#0F172A" text-anchor="middle">16</text>
