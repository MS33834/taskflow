<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="20"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>

  <g opacity="0.4">
    <circle cx="100" cy="100" r="3" fill="#94A3B8"/>
    <circle cx="800" cy="120" r="3" fill="#94A3B8"/>
    <circle cx="120" cy="500" r="3" fill="#94A3B8"/>
    <circle cx="780" cy="480" r="3" fill="#94A3B8"/>
  </g>

  <g transform="translate(50, 60)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="500" rx="36" fill="url(#phone)"/>
    <rect x="10" y="10" width="240" height="480" rx="28" fill="#F8FAFC"/>
    <circle cx="130" cy="20" r="6" fill="#0F172A"/>

    <text x="30" y="50" font-family="-apple-system, sans-serif" font-size="10" font-weight="500" fill="#94A3B8">欢迎回来 👋</text>
    <text x="30" y="76" font-family="-apple-system, sans-serif" font-size="22" font-weight="800" fill="#0F172A">TaskFlow</text>

    <rect x="30" y="92" width="200" height="32" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="50" y="112" font-family="-apple-system, sans-serif" font-size="9" fill="#94A3B8">搜索任务、项目、标签...</text>

    <g transform="translate(20, 140)">
      <rect x="0" y="0" width="70" height="48" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="20" cy="20" r="8" fill="#EFF6FF"/>
      <text x="20" y="24" font-family="-apple-system, sans-serif" font-size="9" fill="#3B82F6" text-anchor="middle">3</text>
      <text x="35" y="40" font-family="-apple-system, sans-serif" font-size="7" fill="#94A3B8">待完成</text>

      <rect x="75" y="0" width="70" height="48" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="95" cy="20" r="8" fill="#ECFDF5"/>
      <text x="95" y="24" font-family="-apple-system, sans-serif" font-size="9" fill="#10B981" text-anchor="middle">12</text>
      <text x="110" y="40" font-family="-apple-system, sans-serif" font-size="7" fill="#94A3B8">已完成</text>

      <rect x="150" y="0" width="70" height="48" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <circle cx="170" cy="20" r="8" fill="#FEF3C7"/>
      <text x="170" y="24" font-family="-apple-system, sans-serif" font-size="9" fill="#F59E0B" text-anchor="middle">80%</text>
      <text x="185" y="40" font-family="-apple-system, sans-serif" font-size="7" fill="#94A3B8">完成率</text>
    </g>

    <g transform="translate(20, 200)">
      <rect x="0" y="0" width="220" height="40" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-dasharray="3 3"/>
      <text x="10" y="16" font-family="-apple-system, sans-serif" font-size="7" font-weight="700" fill="#3B82F6">✨ 智能建议</text>
      <text x="10" y="30" font-family="-apple-system, sans-serif" font-size="8" fill="#1E40AF">将"周报"任务设为紧急优先级</text>
    </g>

    <g transform="translate(20, 256)">
      <rect x="0" y="0" width="220" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="10" y="10" width="20" height="20" rx="5" fill="#3B82F6"/>
      <path d="M14 20 L18 24 L26 16" stroke="#FFFFFF" stroke-width="2" fill="none"/>
      <text x="40" y="22" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#0F172A">完成 Q2 报告</text>
      <text x="40" y="34" font-family="-apple-system, sans-serif" font-size="7" fill="#94A3B8">📅 今天 · 🔴 紧急</text>
    </g>

    <g transform="translate(20, 308)">
      <rect x="0" y="0" width="220" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="10" y="10" width="20" height="20" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.5"/>
      <text x="40" y="22" font-family="-apple-system, sans-serif" font-size="10" fill="#0F172A">设计评审会议</text>
      <text x="40" y="34" font-family="-apple-system, sans-serif" font-size="7" fill="#94A3B8">📅 明天 14:00</text>
    </g>

    <g transform="translate(20, 360)">
      <rect x="0" y="0" width="220" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="10" y="10" width="20" height="20" rx="5" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.5"/>
      <text x="40" y="22" font-family="-apple-system, sans-serif" font-size="10" fill="#0F172A">整理周会议纪要</text>
      <text x="40" y="34" font-family="-apple-system, sans-serif" font-size="7" fill="#94A3B8">📅 周五</text>
    </g>

    <g transform="translate(20, 420)">
      <rect x="0" y="0" width="220" height="36" rx="18" fill="#0F172A"/>
      <circle cx="110" cy="18" r="14" fill="#3B82F6"/>
      <text x="110" y="22" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">+</text>
    </g>
  </g>

  <g transform="translate(360, 60)" filter="url(#shadow)">
    <rect x="0" y="0" width="260" height="500" rx="36" fill="url(#phone)"/>
    <rect x="10" y="10" width="240" height="480" rx="28" fill="#F8FAFC"/>
    <circle cx="130" cy="20" r="6" fill="#0F172A"/>

    <g transform="translate(20, 50)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#0F172A">任务详情</text>
      <rect x="190" y="0" width="36" height="22" rx="11" fill="#FEF2F2"/>
      <text x="208" y="14" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#EF4444" text-anchor="middle">紧急</text>

      <text x="0" y="40" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#0F172A">完成 Q2 季度报告</text>

      <rect x="0" y="55" width="220" height="48" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="72" font-family="-apple-system, sans-serif" font-size="8" font-weight="600" fill="#3B82F6">📝 描述</text>
      <text x="10" y="86" font-family="-apple-system, sans-serif" font-size="7" fill="#64748B">整理二季度数据，输出</text>
      <text x="10" y="98" font-family="-apple-system, sans-serif" font-size="7" fill="#64748B">可视化图表 @Alice 协助</text>

      <rect x="0" y="115" width="220" height="56" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="132" font-family="-apple-system, sans-serif" font-size="8" font-weight="600" fill="#3B82F6">⏱ 专注模式</text>
      <circle cx="40" cy="155" r="14" fill="#10B981"/>
      <path d="M34 155 L40 161 L48 149" stroke="#FFFFFF" stroke-width="2.5" fill="none"/>
      <text x="64" y="150" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#0F172A">25:00</text>
      <text x="64" y="162" font-family="-apple-system, sans-serif" font-size="7" fill="#94A3B8">第 1 回合 · 专注</text>

      <rect x="0" y="183" width="220" height="60" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="10" y="200" font-family="-apple-system, sans-serif" font-size="8" font-weight="600" fill="#3B82F6">💬 评论 (2)</text>
      <circle cx="20" cy="218" r="8" fill="#3B82F6"/>
      <text x="20" y="222" font-family="-apple-system, sans-serif" font-size="8" font-weight="700" fill="#FFFFFF" text-anchor="middle">当</text>
      <text x="32" y="216" font-family="-apple-system, sans-serif" font-size="8" font-weight="600" fill="#0F172A">当前用户</text>
      <text x="32" y="228" font-family="-apple-system, sans-serif" font-size="7" fill="#64748B">记得 @Alice 看一下数据源</text>

      <rect x="0" y="255" width="220" height="30" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
      <text x="10" y="274" font-family="-apple-system, sans-serif" font-size="7" fill="#94A3B8">使用 @ 提及成员</text>
    </g>
  </g>

  <g transform="translate(670, 60)" filter="url(#shadow)">
    <rect x="0" y="0" width="200" height="500" rx="32" fill="url(#phone)"/>
    <rect x="8" y="8" width="184" height="484" rx="24" fill="#0F172A"/>
    <circle cx="100" cy="18" r="4" fill="#1E293B"/>

    <g transform="translate(16, 40)">
      <text x="0" y="20" font-family="-apple-system, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">25:00</text>
      <text x="0" y="34" font-family="-apple-system, sans-serif" font-size="8" fill="#94A3B8" letter-spacing="2">专注 · 第 1 回合</text>

      <circle cx="80" cy="130" r="64" fill="none" stroke="#1E293B" stroke-width="4"/>
      <circle cx="80" cy="130" r="64" fill="none" stroke="#10B981" stroke-width="4" stroke-dasharray="400 400" stroke-dashoffset="60" transform="rotate(-90 80 130)"/>

      <text x="80" y="200" font-family="-apple-system, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle">关闭手机通知 · 专注于当下</text>

      <g transform="translate(20, 230)">
        <circle cx="0" cy="0" r="14" fill="#1E293B"/>
        <circle cx="60" cy="0" r="20" fill="#10B981"/>
        <text x="60" y="4" font-family="-apple-system, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">⏸</text>
        <circle cx="120" cy="0" r="14" fill="#1E293B"/>
      </g>

      <rect x="0" y="260" width="168" height="50" rx="10" fill="#1E293B" stroke="rgba(255,255,255,0.1)"/>
      <text x="10" y="278" font-family="-apple-system, sans-serif" font-size="8" font-weight="600" fill="rgba(255,255,255,0.9)">白噪声</text>
      <text x="10" y="292" font-family="-apple-system, sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">柔和白噪声 · 提升专注</text>
      <circle cx="148" cy="285" r="10" fill="#3B82F6"/>
      <text x="148" y="289" font-family="-apple-system, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">▶</text>

      <g transform="translate(0, 330)">
        <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">🌊 海浪  🔥 雨声  🌲 森林</text>
        <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="7" fill="rgba(255,255,255,0.3)">白噪声 · 粉噪声 · 棕噪声</text>
      </g>
    </g>
  </g>

  <g transform="translate(40, 30)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748B">主屏幕 · 智能建议 · 任务管理</text>
  </g>
  <g transform="translate(360, 30)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748B">任务详情 · @提及 · 专注模式</text>
  </g>
  <g transform="translate(670, 30)">
    <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#64748B">Forest 风格专注 + 白噪声</text>
  </g>
</svg>
