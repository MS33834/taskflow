<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" rx="80" fill="url(#bg)"/>

  <circle cx="320" cy="80" r="30" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="80" cy="320" r="50" fill="#FFFFFF" opacity="0.08"/>

  <g filter="url(#softShadow)">
    <rect x="90" y="90" width="220" height="220" rx="36" fill="url(#card)"/>

    <line x1="120" y1="148" x2="280" y2="148" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
    <line x1="120" y1="192" x2="280" y2="192" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>
    <line x1="120" y1="236" x2="280" y2="236" stroke="#E2E8F0" stroke-width="2" stroke-linecap="round"/>

    <g transform="translate(112, 134)">
      <rect width="22" height="22" rx="6" fill="#10B981"/>
      <path d="M6 11 L10 15 L17 7" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(112, 178)">
      <rect width="22" height="22" rx="6" fill="#3B82F6"/>
      <path d="M6 11 L10 15 L17 7" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(112, 222)">
      <rect width="22" height="22" rx="6" fill="#F59E0B"/>
      <rect x="6" y="9" width="10" height="2" rx="1" fill="#FFFFFF"/>
      <rect x="6" y="13" width="8" height="2" rx="1" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
