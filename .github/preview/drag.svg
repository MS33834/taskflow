        <line x1="0" y1="0" x2="0" y2="20"/>
        <line x1="4" y1="0" x2="4" y2="20"/>
        <line x1="8" y1="0" x2="8" y2="20"/>
        <line x1="0" y1="4" x2="8" y2="4"/>
        <line x1="0" y1="10" x2="8" y2="10"/>
        <line x1="0" y1="16" x2="8" y2="16"/>
