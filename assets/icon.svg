<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <circle cx="800" cy="200" r="80" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="180" cy="820" r="120" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="860" cy="800" r="60" fill="#FFFFFF" opacity="0.10"/>

  <g filter="url(#softShadow)">
    <rect x="240" y="240" width="544" height="544" rx="96" ry="96" fill="url(#card)"/>

    <line x1="320" y1="380" x2="704" y2="380" stroke="#E2E8F0" stroke-width="6" stroke-linecap="round"/>
    <line x1="320" y1="480" x2="704" y2="480" stroke="#E2E8F0" stroke-width="6" stroke-linecap="round"/>
    <line x1="320" y1="580" x2="704" y2="580" stroke="#E2E8F0" stroke-width="6" stroke-linecap="round"/>
    <line x1="320" y1="680" x2="540" y2="680" stroke="#E2E8F0" stroke-width="6" stroke-linecap="round"/>

    <g transform="translate(296, 350)">
      <rect x="0" y="0" width="56" height="56" rx="14" fill="#10B981"/>
      <path d="M14 28 L24 38 L42 18" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <g transform="translate(296, 450)">
      <rect x="0" y="0" width="56" height="56" rx="14" fill="#3B82F6"/>
      <path d="M14 28 L24 38 L42 18" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <g transform="translate(296, 550)">
      <rect x="0" y="0" width="56" height="56" rx="14" fill="#F59E0B"/>
      <rect x="16" y="22" width="24" height="4" rx="2" fill="#FFFFFF"/>
      <rect x="16" y="32" width="20" height="4" rx="2" fill="#FFFFFF"/>
    </g>
    <g transform="translate(296, 650)">
      <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#bg)"/>
      <rect x="14" y="14" width="28" height="28" rx="6" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    </g>
  </g>

  <g transform="translate(380, 760)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="#FFFFFF"/>
    <text x="40" y="60" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="#3B82F6" text-anchor="middle">T</text>
  </g>

  <text x="512" y="900" font-family="-apple-system, system-ui, sans-serif" font-size="80" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">TaskFlow</text>
</svg>
