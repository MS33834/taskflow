# mypy 配置
# 注意：本项目使用独立的 mypy.ini 而非 pyproject.toml 的 [tool.mypy]。
# 在 mypy 2.1 下，pyproject.toml 中的 [[tool.mypy.overrides]] 对随包
# 附带的 PEP 561 stub（如 numpy）的 follow_imports 不生效，会因本地
# Python 3.14 环境的 numpy stub 使用了 3.12+ 的 `type` 语句而报
# syntax error 并阻断检查。改用 mypy.ini 后 overrides 可正常生效。
[mypy]
python_version = 3.11
strict = True
exclude = (?x)(^|/)(\.venv|build|dist)/
plugins = pydantic.mypy

# 第三方库（如 numpy）在较新 Python 环境下随附的 PEP 561 stub 可能
# 使用 3.12+ 语法，在 python_version=3.11 下会触发 syntax error。
# 跳过对这些库内部的跟进，避免环境差异阻断项目代码的类型检查。
# 注意：mypy 2.1 的 INI 解析下，单段 module=numpy 不生效，需拆成两段
# （会有 "section already exists" 提示，但不影响检查结果）。
[[mypy.overrides]]
module = numpy
follow_imports = skip

[[mypy.overrides]]
module = numpy.*
follow_imports = skip
